<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IronLink</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <style>
      /* ── System-theme CSS variables ── */
      :root {
        --splash-bg: #0c0d10;
        --splash-text: #f1f1ef;
        --splash-secondary: #a7a8ad;
        --splash-tertiary: #6c6e74;
        --splash-dot: rgba(255,255,255,0.18);
        --splash-logo-stroke: #fff;
      }
      @media (prefers-color-scheme: light) {
        :root {
          --splash-bg: #f4f3ef;
          --splash-text: #1c1a17;
          --splash-secondary: #5c554b;
          --splash-tertiary: #948c80;
          --splash-dot: rgba(20,18,16,0.16);
          --splash-logo-stroke: #2c2a26;
        }
      }

      /* ── Splash / startup screen ── */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: var(--splash-bg);
        color: var(--splash-text);
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
      #splash-logo { width: 56px; height: 56px; margin-bottom: 20px; }
      #splash-logo svg { width: 100%; height: 100%; }
      #splash-logo svg path { transition: stroke 0.2s; }
      #splash-name {
        font-size: 22px; font-weight: 700; letter-spacing: 0.3px;
        margin-bottom: 6px;
      }
      #splash-desc {
        font-size: 13px; color: var(--splash-secondary); margin-bottom: 28px;
      }
      #splash-dots { display: flex; gap: 6px; }
      #splash-dots span {
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--splash-dot);
        animation: splashPulse 1.4s ease-in-out infinite both;
      }
      #splash-dots span:nth-child(1) { animation-delay: 0s; }
      #splash-dots span:nth-child(2) { animation-delay: 0.2s; }
      #splash-dots span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes splashPulse {
        0%, 80%, 100% { transform: scale(1); opacity: 0.3; }
        40% { transform: scale(1.3); opacity: 0.8; }
      }
      #splash-version {
        position: absolute; bottom: 24px;
        font-size: 11px; color: var(--splash-tertiary);
      }
      /* ── Ambient accents ── */
      #splash-accent {
        position: absolute; top: -120px; right: -80px;
        width: 280px; height: 280px;
        background: radial-gradient(circle, rgba(255,106,61,0.10) 0%, transparent 70%);
        pointer-events: none;
      }
      #splash-accent2 {
        position: absolute; bottom: -100px; left: -60px;
        width: 240px; height: 240px;
        background: radial-gradient(circle, rgba(100,180,255,0.07) 0%, transparent 70%);
        pointer-events: none;
      }
      @media (prefers-color-scheme: light) {
        #splash-accent {
          background: radial-gradient(circle, rgba(255,90,44,0.08) 0%, transparent 70%);
        }
        #splash-accent2 {
          background: radial-gradient(circle, rgba(50,130,220,0.06) 0%, transparent 70%);
        }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div id="splash-accent"></div>
      <div id="splash-accent2"></div>
      <div id="splash-logo">
        <svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="64" y="64" width="384" height="384" rx="96" fill="url(#g1)" />
          <path d="M160 256 L224 192 L288 256 L352 192" stroke="var(--splash-logo-stroke)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55"/>
          <path d="M176 288 L256 368 L336 288" stroke="var(--splash-logo-stroke)" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <defs>
            <linearGradient id="g1" x1="64" y1="64" x2="448" y2="448">
              <stop offset="0%" stop-color="#ff6a3d"/>
              <stop offset="100%" stop-color="#e04e2a"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div id="splash-name">IronLink</div>
      <div id="splash-desc">正在初始化服务…</div>
      <div id="splash-dots"><span></span><span></span><span></span></div>
      <div id="splash-version">v0.3.3</div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // ── Hide splash once React has mounted ──
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          document.getElementById('splash')?.classList.add('hidden');
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      // Fallback: force-hide after 15s
      setTimeout(() => {
        document.getElementById('splash')?.classList.add('hidden');
      }, 15000);
    </script>
  </body>
</html>
