name: Release

on:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: IronLink

jobs:
  # ---- Native builds: macOS / Linux x86_64 / Windows ----
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-latest
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - name: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            libssl-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install Homebrew dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri (macOS ARM64)
        if: matrix.name == 'macos'
        run: npm run tauri build -- --target aarch64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri (macOS Intel)
        if: matrix.name == 'macos'
        run: npm run tauri build -- --target x86_64-apple-darwin
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Build Tauri
        if: matrix.name != 'macos'
        run: npm run tauri build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload macOS ARM64
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/

      - name: Upload macOS Intel
        if: matrix.name == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-x64
          path: src-tauri/target/x86_64-apple-darwin/release/bundle/

      - name: Upload other artifacts
        if: matrix.name != 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.name }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/

  # ---- Linux ARM64: native cross-compilation ----
  build-linux-arm64:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup cross-compilation environment
        run: |
          sudo rm -f /etc/apt/sources.list.d/ubuntu.sources
          CODENAME=$(lsb_release -cs)
          echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu $CODENAME main universe restricted multiverse" | sudo tee /etc/apt/sources.list.d/amd64.list
          echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-updates main universe restricted multiverse" | sudo tee -a /etc/apt/sources.list.d/amd64.list
          echo "deb [arch=amd64] http://archive.ubuntu.com/ubuntu ${CODENAME}-backports main universe restricted multiverse" | sudo tee -a /etc/apt/sources.list.d/amd64.list
          echo "deb [arch=amd64] http://security.ubuntu.com/ubuntu ${CODENAME}-security main universe restricted multiverse" | sudo tee -a /etc/apt/sources.list.d/amd64.list
          sudo dpkg --add-architecture arm64
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $CODENAME main universe restricted multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-updates main universe restricted multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-backports main universe restricted multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports ${CODENAME}-security main universe restricted multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
          sudo apt-get update -q || true

      - name: Install ARM64 toolchain and libraries
        run: sudo apt-get install -y -q gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libwebkit2gtk-4.1-dev:arm64 libgtk-3-dev:arm64 libayatana-appindicator3-dev:arm64 librsvg2-dev:arm64 libssl-dev:arm64 libsoup-3.0-dev:arm64 libjavascriptcoregtk-4.1-dev:arm64

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Set cross-compilation env
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_gnu=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CXX_aarch64_unknown_linux_gnu=aarch64-linux-gnu-g++" >> $GITHUB_ENV
          echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig" >> $GITHUB_ENV


      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri for ARM64
        run: npm run tauri build -- --target aarch64-unknown-linux-gnu --bundles deb,rpm

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-arm64
          path: src-tauri/target/aarch64-unknown-linux-gnu/release/bundle/

  # ---- Create GitHub Release ----
  create-release:
    needs: [build-native, build-linux-arm64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List release files
        run: |
          echo "=== Release artifacts ==="
          find release-artifacts -type f -exec ls -lh {} \;

      - name: Delete previous release for this tag
        run: gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.APP_NAME }} ${{ github.ref_name }}
          body: |
            ## IronLink ${{ github.ref_name }}

            | Platform | Architecture | Format |
            |---|---|---|
            | macOS | Apple Silicon | .dmg |
            | macOS | Intel | .dmg |
            | Linux | x86_64 | .deb / .AppImage |
            | Linux | ARM64 | .deb / .rpm |
            | Windows | x86_64 | .msi / .exe |
          generate_release_notes: true
          files: release-artifacts/**/*.{deb,rpm,AppImage,dmg,msi}
          fail_on_unmatched_files: false
